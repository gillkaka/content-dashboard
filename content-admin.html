<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>内容管理后台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }
        .input-field {
            transition: all 0.2s ease;
        }
        .input-field:focus {
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.3);
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: all 0.2s ease;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        .table-row {
            transition: all 0.2s ease;
        }
        .table-row:hover {
            background-color: #f8fafc;
        }
        .fade-in {
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .slide-in {
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <div class="glass-card rounded-2xl p-6 mb-6 shadow-xl">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                <div>
                    <h1 class="text-2xl md:text-3xl font-bold text-gray-800">内容管理后台</h1>
                    <p class="text-gray-500 mt-1">添加、编辑和管理内容同步数据</p>
                </div>
                <div class="flex gap-3">
                    <a href="content-sync-dashboard.html" target="_blank" class="px-4 py-2 bg-white border border-gray-200 rounded-xl text-sm font-medium text-gray-700 hover:bg-gray-50 transition-all">
                        查看展示页
                    </a>
                    <button onclick="exportData()" class="px-4 py-2 bg-white border border-gray-200 rounded-xl text-sm font-medium text-gray-700 hover:bg-gray-50 transition-all">
                        导出数据
                    </button>
                    <label class="px-4 py-2 bg-white border border-gray-200 rounded-xl text-sm font-medium text-gray-700 hover:bg-gray-50 transition-all cursor-pointer">
                        导入数据
                        <input type="file" id="importFile" accept=".json" class="hidden" onchange="importData(this)">
                    </label>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- Form Section -->
            <div class="lg:col-span-1">
                <div class="glass-card rounded-2xl p-6 shadow-lg sticky top-6 max-h-[90vh] overflow-y-auto">
                    <h2 class="text-lg font-semibold text-gray-800 mb-4" id="formTitle">添加新内容</h2>
                    <form id="contentForm" class="space-y-3">
                        <input type="hidden" id="editIndex" value="">
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">日期</label>
                            <input type="text" id="date" placeholder="如：3月9日" class="input-field w-full px-3 py-2 border border-gray-200 rounded-lg focus:outline-none focus:border-indigo-500">
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">公众号</label>
                            <select id="gzh" class="input-field w-full px-3 py-2 border border-gray-200 rounded-lg focus:outline-none focus:border-indigo-500">
                                <option value="嬉游">嬉游</option>
                                <option value="旅行雷达">旅行雷达</option>
                                <option value="精明常旅客">精明常旅客</option>
                                <option value="Aires">Aires</option>
                                <option value="ikids">ikids</option>
                                <option value="其他">其他</option>
                            </select>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">分类</label>
                            <input type="text" id="category" placeholder="如：万豪专场" class="input-field w-full px-3 py-2 border border-gray-200 rounded-lg focus:outline-none focus:border-indigo-500">
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">目的地</label>
                            <input type="text" id="destination" placeholder="如：三亚" class="input-field w-full px-3 py-2 border border-gray-200 rounded-lg focus:outline-none focus:border-indigo-500">
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">景点</label>
                            <input type="text" id="attraction" placeholder="如：海棠湾" class="input-field w-full px-3 py-2 border border-gray-200 rounded-lg focus:outline-none focus:border-indigo-500">
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">酒店</label>
                            <input type="text" id="hotel" placeholder="如：三亚万达嘉华" class="input-field w-full px-3 py-2 border border-gray-200 rounded-lg focus:outline-none focus:border-indigo-500">
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">售卖平台</label>
                            <select id="platform" class="input-field w-full px-3 py-2 border border-gray-200 rounded-lg focus:outline-none focus:border-indigo-500">
                                <option value="飞猪">飞猪</option>
                                <option value="携程">携程</option>
                                <option value="美团">美团</option>
                                <option value="无">无</option>
                                <option value="其他">其他</option>
                            </select>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">链接</label>
                            <input type="url" id="link" placeholder="https://..." class="input-field w-full px-3 py-2 border border-gray-200 rounded-lg focus:outline-none focus:border-indigo-500">
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">用户留言</label>
                            <textarea id="description" rows="2" placeholder="用户留言内容..." class="input-field w-full px-3 py-2 border border-gray-200 rounded-lg focus:outline-none focus:border-indigo-500 resize-none"></textarea>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">备注</label>
                            <textarea id="note" rows="2" placeholder="备注信息..." class="input-field w-full px-3 py-2 border border-gray-200 rounded-lg focus:outline-none focus:border-indigo-500 resize-none"></textarea>
                        </div>
                        
                        <div class="flex gap-3 pt-2">
                            <button type="submit" class="btn-primary flex-1 py-2.5 text-white font-medium rounded-lg">
                                <span id="submitBtnText">添加</span>
                            </button>
                            <button type="button" onclick="resetForm()" class="px-4 py-2.5 bg-gray-100 text-gray-700 font-medium rounded-lg hover:bg-gray-200 transition-all">
                                重置
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- List Section -->
            <div class="lg:col-span-2">
                <div class="glass-card rounded-2xl p-6 shadow-lg">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-lg font-semibold text-gray-800">内容列表</h2>
                        <div class="flex gap-2">
                            <input type="text" id="searchList" placeholder="搜索..." class="input-field px-3 py-1.5 text-sm border border-gray-200 rounded-lg focus:outline-none focus:border-indigo-500" oninput="renderList()">
                            <button onclick="clearAll()" class="px-3 py-1.5 text-sm text-red-600 hover:bg-red-50 rounded-lg transition-all">
                                清空全部
                            </button>
                        </div>
                    </div>
                    
                    <div class="overflow-x-auto">
                        <table class="w-full">
                            <thead>
                                <tr class="bg-gray-50">
                                    <th class="px-3 py-2 text-left text-xs font-semibold text-gray-600">日期</th>
                                    <th class="px-3 py-2 text-left text-xs font-semibold text-gray-600">公众号</th>
                                    <th class="px-3 py-2 text-left text-xs font-semibold text-gray-600">目的地</th>
                                    <th class="px-3 py-2 text-left text-xs font-semibold text-gray-600">酒店</th>
                                    <th class="px-3 py-2 text-left text-xs font-semibold text-gray-600">平台</th>
                                    <th class="px-3 py-2 text-center text-xs font-semibold text-gray-600">操作</th>
                                </tr>
                            </thead>
                            <tbody id="contentList" class="divide-y divide-gray-100">
                                <!-- Content will be rendered here -->
                            </tbody>
                        </table>
                    </div>
                    
                    <div id="emptyList" class="hidden text-center py-12">
                        <div class="text-4xl mb-2">📝</div>
                        <p class="text-gray-500">暂无内容，请添加</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

        // Load data - always use defaultData
        let contentData = defaultData;

        // Save data to localStorage
        function saveData() {
            localStorage.setItem('contentData', JSON.stringify(contentData));
        }

        // Render list
        function renderList() {
            const tbody = document.getElementById('contentList');
            const emptyState = document.getElementById('emptyList');
            const searchTerm = document.getElementById('searchList').value.toLowerCase();
            
            let filtered = contentData;
            if (searchTerm) {
                filtered = contentData.filter(item => 
                    Object.values(item).some(val => 
                        val && val.toString().toLowerCase().includes(searchTerm)
                    )
                );
            }
            
            if (filtered.length === 0) {
                tbody.innerHTML = '';
                emptyState.classList.remove('hidden');
                return;
            }
            
            emptyState.classList.add('hidden');
            tbody.innerHTML = filtered.map((item, index) => `
                <tr class="table-row">
                    <td class="px-3 py-2 text-sm text-gray-700">${item.date || '-'}</td>
                    <td class="px-3 py-2"><span class="px-2 py-0.5 bg-indigo-100 text-indigo-700 text-xs rounded-full">${item.gzh}</span></td>
                    <td class="px-3 py-2 text-sm text-gray-700">${item.destination || '-'}</td>
                    <td class="px-3 py-2 text-sm text-gray-600 truncate max-w-[150px]" title="${item.hotel || ''}">${item.hotel || '-'}</td>
                    <td class="px-3 py-2"><span class="px-2 py-0.5 ${getPlatformColor(item.platform)} text-xs rounded-full">${item.platform || '-'}</span></td>
                    <td class="px-3 py-2 text-center">
                        <button onclick="editItem(${contentData.indexOf(item)})" class="text-indigo-600 hover:text-indigo-800 text-sm mr-2">编辑</button>
                        <button onclick="deleteItem(${contentData.indexOf(item)})" class="text-red-600 hover:text-red-800 text-sm">删除</button>
                    </td>
                </tr>
            `).join('');
        }

        function getPlatformColor(platform) {
            const colors = {
                "飞猪": "bg-orange-100 text-orange-700",
                "携程": "bg-blue-100 text-blue-700",
                "美团": "bg-yellow-100 text-yellow-700",
                "无": "bg-gray-100 text-gray-700"
            };
            return colors[platform] || "bg-gray-100 text-gray-700";
        }

        // Form submission
        document.getElementById('contentForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const newItem = {
                date: document.getElementById('date').value,
                gzh: document.getElementById('gzh').value,
                category: document.getElementById('category').value,
                destination: document.getElementById('destination').value,
                attraction: document.getElementById('attraction').value,
                hotel: document.getElementById('hotel').value,
                platform: document.getElementById('platform').value,
                link: document.getElementById('link').value,
                description: document.getElementById('description').value,
                note: document.getElementById('note').value
            };
            
            const editIndex = document.getElementById('editIndex').value;
            
            if (editIndex !== '') {
                contentData[parseInt(editIndex)] = newItem;
            } else {
                contentData.push(newItem);
            }
            
            saveData();
            renderList();
            resetForm();
            
            // Show success message
            showToast(editIndex !== '' ? '更新成功！' : '添加成功！');
        });

        // Edit item
        function editItem(index) {
            const item = contentData[index];
            document.getElementById('date').value = item.date || '';
            document.getElementById('gzh').value = item.gzh || '';
            document.getElementById('category').value = item.category || '';
            document.getElementById('destination').value = item.destination || '';
            document.getElementById('attraction').value = item.attraction || '';
            document.getElementById('hotel').value = item.hotel || '';
            document.getElementById('platform').value = item.platform || '';
            document.getElementById('link').value = item.link || '';
            document.getElementById('description').value = item.description || '';
            document.getElementById('note').value = item.note || '';
            document.getElementById('editIndex').value = index;
            document.getElementById('formTitle').textContent = '编辑内容';
            document.getElementById('submitBtnText').textContent = '更新';
            
            // Scroll to form on mobile
            document.getElementById('contentForm').scrollIntoView({ behavior: 'smooth' });
        }

        // Delete item
        function deleteItem(index) {
            if (confirm('确定要删除这条内容吗？')) {
                contentData.splice(index, 1);
                saveData();
                renderList();
                showToast('删除成功！');
            }
        }

        // Reset form
        function resetForm() {
            document.getElementById('contentForm').reset();
            document.getElementById('editIndex').value = '';
            document.getElementById('formTitle').textContent = '添加新内容';
            document.getElementById('submitBtnText').textContent = '添加';
        }

        // Clear all
        function clearAll() {
            if (confirm('确定要清空所有内容吗？此操作不可恢复！')) {
                contentData = [];
                saveData();
                renderList();
                showToast('已清空全部内容');
            }
        }

        // Export data
        function exportData() {
            const dataStr = JSON.stringify(contentData, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `content-data-${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('数据已导出！');
        }

        // Import data
        function importData(input) {
            const file = input.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const imported = JSON.parse(e.target.result);
                    if (Array.isArray(imported)) {
                        contentData = imported;
                        saveData();
                        renderList();
                        showToast('数据导入成功！');
                    } else {
                        alert('文件格式不正确');
                    }
                } catch (err) {
                    alert('无法解析文件');
                }
            };
            reader.readAsText(file);
            input.value = '';
        }

        // Toast notification
        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'fixed bottom-4 right-4 bg-gray-800 text-white px-6 py-3 rounded-lg shadow-lg fade-in z-50';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 300);
            }, 2000);
        }

        // Initial render
        renderList();
    </script>
