        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .tag-btn {
            transition: all 0.2s ease;
        }
        .tag-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }
        .filter-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .search-input:focus {
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.3);
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.5s ease forwards;
        }
        .table-row {
            transition: all 0.2s ease;
        }
        .table-row:hover {
            background-color: #f8fafc;
        }
        .row-spacing-compact td {
            padding-top: 0.25rem;
            padding-bottom: 0.25rem;
        }
        .row-spacing-normal td {
            padding-top: 0.5rem;
            padding-bottom: 0.5rem;
        }
        .row-spacing-loose td {
            padding-top: 1rem;
            padding-bottom: 1rem;
        }
        .spacing-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        /* Prevent text wrapping */
        .nowrap {
            white-space: nowrap;
        }
        .ellipsis {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
    </style>
</head>

        let contentData = [];
        let currentRowSpacing = 'normal';

        // Platform colors and styles - same as link button style
        const platformStyles = {
            "飞猪": "bg-gradient-to-r from-orange-500 to-orange-600 text-white",
            "携程": "bg-gradient-to-r from-blue-500 to-blue-600 text-white",
            "美团": "bg-gradient-to-r from-yellow-500 to-yellow-600 text-white",
            "无": "bg-gradient-to-r from-gray-500 to-gray-600 text-white"
        };

        const gzhStyles = {
            "嬉游": "bg-gradient-to-r from-indigo-500 to-purple-500 text-white",
            "旅行雷达": "bg-gradient-to-r from-pink-500 to-rose-500 text-white",
            "精明常旅客": "bg-gradient-to-r from-cyan-500 to-blue-500 text-white",
            "Aires": "bg-gradient-to-r from-emerald-500 to-teal-500 text-white",
            "ikids": "bg-gradient-to-r from-violet-500 to-purple-500 text-white"
        };

        // Custom sort: 12月放最后，其他按月份降序
        function sortByDate(data) {
            return data.sort((a, b) => {
                try {
                    const [ma, da] = a.date.replace('月', '-').replace('日', '').split('-').map(Number);
                    const [mb, db] = b.date.replace('月', '-').replace('日', '').split('-').map(Number);
                    // If month is 12, put it at the end
                    if (ma === 12 && mb !== 12) return 1;
                    if (ma !== 12 && mb === 12) return -1;
                    if (ma === 12 && mb === 12) return da - db;
                    // Otherwise descending order
                    if (ma !== mb) return mb - ma;
                    return db - da;
                } catch {
                    return 0;
                }
            });
        }

        // Load data from localStorage, fallback to defaultData
        function loadData() {
            const stored = localStorage.getItem('contentData');
            if (stored) {
                try {
                    const parsed = JSON.parse(stored);
                    if (parsed && parsed.length > 0) {
                        contentData = sortByDate(parsed);
                    } else {
                        contentData = sortByDate([...defaultData]);
                    }
                } catch (e) {
                    contentData = sortByDate([...defaultData]);
                }
            } else {
                contentData = sortByDate([...defaultData]);
            }
            updateStats();
            filterData();
        }

        // Update statistics
        function updateStats() {
            document.getElementById('totalCount').textContent = contentData.length;
            document.getElementById('feizhuCount').textContent = contentData.filter(i => i.platform === '飞猪').length;
            document.getElementById('xiechengCount').textContent = contentData.filter(i => i.platform === '携程').length;
            document.getElementById('meituanCount').textContent = contentData.filter(i => i.platform === '美团').length;
        }

        // Set row spacing
        function setRowSpacing(spacing) {
            currentRowSpacing = spacing;
            document.querySelectorAll('.spacing-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.spacing === spacing) btn.classList.add('active');
            });
            filterData();
        }

        // Render table
        function renderTable(data) {
            const tbody = document.getElementById('contentTable');
            const emptyState = document.getElementById('emptyState');
            
            if (data.length === 0) {
                tbody.innerHTML = '';
                emptyState.classList.remove('hidden');
                return;
            }
            
            emptyState.classList.add('hidden');
            tbody.innerHTML = data.map((item, index) => `
                <tr class="table-row animate-fade-in row-spacing-${currentRowSpacing}" style="animation-delay: ${index * 0.03}s">
                    <td class="px-3 text-sm text-gray-700 whitespace-nowrap">${item.date}</td>
                    <td class="px-3">
                        <span class="tag-btn inline-flex items-center px-2.5 py-1 rounded-lg text-xs font-medium ${gzhStyles[item.gzh] || 'bg-gradient-to-r from-gray-500 to-gray-600 text-white'}">
                            ${item.gzh}
                        </span>
                    </td>
                    <td class="px-3 text-sm text-gray-600 whitespace-nowrap">${item.category || '-'}</td>
                    <td class="px-3 text-sm font-medium text-gray-800 whitespace-nowrap ellipsis" style="max-width:150px;" title="${item.destination}">${item.destination || '-'}</td>
                    <td class="px-3 text-sm text-gray-600 whitespace-nowrap ellipsis" style="max-width:150px;" title="${item.attraction}">${item.attraction || '-'}</td>
                    <td class="px-3 text-sm text-gray-700 whitespace-nowrap ellipsis" style="max-width:180px;" title="${item.hotel}">${item.hotel || '-'}</td>
                    <td class="px-3">
                        <span class="tag-btn inline-flex items-center px-2.5 py-1 rounded-lg text-xs font-medium ${platformStyles[item.platform] || 'bg-gradient-to-r from-gray-500 to-gray-600 text-white'}">
                            ${item.platform || '-'}
                        </span>
                    </td>
                    <td class="px-3">
                        ${item.link ? `<a href="${item.link}" target="_blank" class="tag-btn inline-flex items-center px-3 py-1.5 bg-gradient-to-r from-indigo-500 to-purple-500 text-white text-xs font-medium rounded-lg">
                            <svg class="w-3 h-3 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path>
                            </svg>
                            查看
                        </a>` : '-'}
                    </td>
                    <td class="px-3 text-sm text-gray-500" style="max-width:200px;">
                        <div class="truncate" title="${item.description}">${item.description || '-'}</div>
                    </td>
                    <td class="px-3 text-sm text-gray-500 whitespace-nowrap">${item.note || '-'}</td>
                </tr>
            `).join('');
        }

        // Filter functionality
        let currentFilter = 'all';
        let searchTerm = '';

        function filterData() {
            let filtered = contentData;
            
            if (currentFilter !== 'all') {
                // Check if currentFilter matches gzh OR platform
                filtered = filtered.filter(item => 
                    item.gzh === currentFilter || item.platform === currentFilter
                );
            }
            
            if (searchTerm) {
                const term = searchTerm.toLowerCase();
                filtered = filtered.filter(item => 
                    (item.destination && item.destination.toLowerCase().includes(term)) ||
                    (item.attraction && item.attraction.toLowerCase().includes(term)) ||
                    (item.hotel && item.hotel.toLowerCase().includes(term)) ||
                    (item.category && item.category.toLowerCase().includes(term)) ||
                    (item.gzh && item.gzh.toLowerCase().includes(term))
                );
            }
            
            renderTable(filtered);
        }

        // Event listeners
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                filterData();
            });
        });

        document.getElementById('searchInput').addEventListener('input', (e) => {
            searchTerm = e.target.value;
            filterData();
        });

        // Initial load
        loadData();
    </script>
